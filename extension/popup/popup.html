<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Copilot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="head">
      <span class="dot"></span>
      <h1>Interview AI - Meeting Copilot</h1>
    </header>

    <main>
      <div id="authSection">
        <p class="muted">Sign in to access AI-powered meeting assistance.</p>
        <button id="signInBtn" class="google-signin-btn">
          <svg class="google-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
      </div>

      <div id="meetingSection" style="display: none">
        <div class="user-info">
          <span id="userEmail"></span>
          <button id="signOutBtn" class="link">Sign out</button>
        </div>

        <label class="field">
          <span>Active meeting link</span>
          <input id="link" type="url" placeholder="https://meet.google.com/abc-defg-hij" />
          <small>Only this meeting will be assisted.</small>
        </label>

        <label class="field">
          <span>Meeting title (optional)</span>
          <input id="title" type="text" placeholder="Weekly sync" />
        </label>

        <label class="field">
          <span>Context / brief (optional)</span>
          <textarea id="context" rows="3" placeholder="Background the AI should use when answering…"></textarea>
        </label>

        <label class="field">
          <span>Attach files (PDF, Word, Excel)</span>
          <input id="fileInput" type="file" accept=".pdf,.doc,.docx,.xls,.xlsx" multiple />
          <small>Files will be used to enhance AI responses.</small>
        </label>

        <div id="fileList" class="file-list"></div>

        <div class="row">
          <label class="toggle enhanced">
            <input id="autoAnswer" type="checkbox" />
            <span class="toggle-label">
              <span class="toggle-text">Auto-answer questions</span>
              <span class="toggle-desc">Automatically answer detected questions</span>
            </span>
          </label>
          <label class="toggle enhanced">
            <input id="autoSend" type="checkbox" />
            <span class="toggle-label">
              <span class="toggle-text">Auto-send to chat</span>
              <span class="toggle-desc">Send answers automatically</span>
            </span>
          </label>
        </div>

        <div class="actions">
          <button id="save" class="btn-primary">Save</button>
        </div>
      </div>

      <p id="status" class="status"></p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
