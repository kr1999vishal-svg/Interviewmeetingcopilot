<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Meeting Copilot — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <div class="wrap">
      <h1>Interview AI - Meeting Copilot — Settings</h1>
      <p class="muted">
        AI configuration is managed by the service administrator. Sign in to access the extension features.
      </p>

      <label class="toggle">
        <input id="enabled" type="checkbox" />
        <span>Enable overlay on meeting pages</span>
      </label>

      <div class="actions">
        <button id="save" class="btn-primary">Save settings</button>
      </div>
      <p id="status" class="status"></p>
    </div>

    <script src="options.js"></script>
  </body>
</html>
