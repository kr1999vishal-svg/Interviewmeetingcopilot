<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=800">
  <title>Meeting Copilot - Settings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 800px;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 520px;
      width: 100%;
      padding: 32px;
      background: #1e293b;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .muted { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 14px; color: #cbd5e1; margin-bottom: 8px; }
    input, select {
      width: 100%; padding: 12px 16px; border-radius: 8px;
      border: 1px solid rgba(148,163,184,0.25); background: #0f172a; color: #e2e8f0;
      font-size: 14px; font-family: inherit;
    }
    input:focus, select:focus { outline: none; border-color: #6366f1; }
    .toggle { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .toggle input { width: auto; }
    .actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-primary, .btn {
      padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none;
    }
    .btn-primary { background: #4f46e5; color: #fff; flex: 1; }
    .btn { background: #334155; color: #e2e8f0; border: 1px solid rgba(148,163,184,0.25); }
    .status { font-size: 14px; margin-top: 12px; color: #6ee7b7; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Meeting Copilot Settings</h1>
    <p class="muted">Configure your backend and AI provider</p>
    
    <div class="field">
      <label>Backend URL</label>
      <input type="text" value="http://localhost:4000" placeholder="http://localhost:4000">
    </div>
    
    <div class="field">
      <label>AI Provider</label>
      <select>
        <option>OpenAI</option>
        <option>Anthropic</option>
        <option>Google</option>
      </select>
    </div>
    
    <div class="field">
      <label>API Key</label>
      <input type="password" value="sk-••••••••••••••••••••••••••••••••" placeholder="sk-...">
    </div>
    
    <div class="field">
      <label>Model (optional)</label>
      <input type="text" value="gpt-4o" placeholder="gpt-4o">
    </div>
    
    <div class="toggle">
      <input type="checkbox" checked>
      <label>Enable overlay on meeting pages</label>
    </div>
    
    <div class="actions">
      <button class="btn">Cancel</button>
      <button class="btn-primary">Save Settings</button>
    </div>
    
    <p class="status">✓ Connection successful</p>
  </div>
</body>
</html>
